name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_path:
        description: 'Target folder path on the server'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build frontend
        run: npm run build
        working-directory: app

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            --exclude='/app/public/2022-data' \
            --exclude='/app/public/2023-data' \
            --exclude='/app/dist/2022-data' \
            --exclude='/app/dist/2023-data' \
            --exclude='/preprocessor/target' \
            --exclude='/preprocessor/tmp' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
